server {
    listen 80;
    server_name numon-hoca.hujjatlar.uz;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name numon-hoca.hujjatlar.uz;

    root /var/www/nurcrm/public;
    index index.php;

    ssl_certificate /etc/letsencrypt/live/numon-hoca.hujjatlar.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/numon-hoca.hujjatlar.uz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm-nurcrm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Telegram webhook — faqat Telegram IP laridan
    location /telegram/webhook {
        allow 149.154.160.0/20;
        allow 149.154.164.0/22;
        allow 91.108.4.0/22;
        allow 91.108.56.0/22;
        allow 91.108.8.0/22;
        allow 95.161.64.0/20;
        deny all;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static fayllar cache
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Storage fayllar
    location /storage {
        alias /var/www/nurcrm/storage/app/public;
        expires 7d;
    }

    # Vocab exam — Telegram iframe uchun
    location /vocab-exam {
        try_files $uri $uri/ /index.php?$query_string;
        add_header X-Frame-Options "";
        add_header Content-Security-Policy "frame-ancestors 'self' https://web.telegram.org https://t.me";
    }

    # .env va boshqa maxfiy fayllarni bloklash
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/nurcrm_access.log;
    error_log  /var/log/nginx/nurcrm_error.log;
}
